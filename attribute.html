<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Attribute</title>
        <style>
        a {
            color: green;
        }

        a[href="https://walmart.com"] {
            color: red;
        }
        </style>
    </head>
    <body>
        <ul>
            <li><a href="https://google.com">Google</a></li>
            <li><a href="https://walmart.com">Walmart</a></li>
            <li><a href="https://amazon.com">Amazon</a></li>
       </ul>
    </body>
</html>
