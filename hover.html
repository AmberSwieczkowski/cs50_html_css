<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Hover</title>
        <style>
            button {
                width: 600px;
                height: 400px;
                font-size: 50px;
                background-color: silver;
            }

            button:hover {
                background-color: orange; 
            }
        </style>
    </head>
    <body>
        <button>Click Me</button>
    </body>
</html>
